<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Credit Risk Predictor</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: Arial, sans-serif;
            background: #f0f4f8;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .card {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 420px;
            width: 90%;
        }
        h1 { font-size: 24px; color: #1a202c; margin-bottom: 12px; }
        p  { color: #718096; font-size: 15px; margin-bottom: 28px; line-height: 1.6; }
        a {
            text-decoration: none;
            background: #2b6cb0;
            color: white;
            padding: 12px 28px;
            border-radius: 8px;
            display: inline-block;
            font-size: 15px;
        }
        a:hover { background: #2c5282; }
    </style>
</head>
<body>
<div class="card">
    <h1>Credit Risk Predictor</h1>
    <p>Enter applicant financial details to predict the loan default risk score using Machine Learning.</p>
    <a href="/predictdata">Start Prediction</a>
</div>
</body>
</html>
